name: Build and Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y jq zip

      - name: Build Chrome extension
        run: cd build && ./build.sh chrome

      - name: Preserve Chrome artifact
        run: cp out/link-previewer-chrome-v*.zip /tmp/

      - name: Build Firefox extension
        run: cd build && ./build.sh firefox

      - name: Restore Chrome artifact
        run: cp /tmp/link-previewer-chrome-v*.zip out/

      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Link Previewer v${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            out/link-previewer-chrome-v${{ steps.version.outputs.tag }}.zip
            out/link-previewer-firefox-v${{ steps.version.outputs.tag }}.zip

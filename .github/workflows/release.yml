name: Build and Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip
          npm install

      - name: Build Chrome extension
        run: npm run build chrome

      - name: Preserve Chrome artifact
        run: cp out/link-previewer-chrome-*.zip /tmp/

      - name: Build Firefox extension
        run: npm run build firefox

      - name: Restore Chrome artifact
        run: cp /tmp/link-previewer-chrome-*.zip out/

      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Link Previewer ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            out/link-previewer-chrome-*.zip
            out/link-previewer-firefox-*.zip
